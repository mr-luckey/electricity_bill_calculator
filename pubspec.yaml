name: electricity_bill_calculator
description: Pakistan Electricity Bill Calculator - bilingual bill estimator for all major DISCOs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_remote_config: ^5.4.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0

  # Ads
  google_mobile_ads: ^5.3.0

  # Google Sign-In
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/data/default_tariffs.json