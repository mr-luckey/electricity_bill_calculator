<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Squish Out — Main Game UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-top: #e8f4f0;
      --bg-bot: #f7efe6;
      --board: #fbf8f3;
      --board-edge: #e6ddd0;
      --ink: #2c3340;
      --muted: #7a8494;
      --mint: #6ec9b0;
      --mint-deep: #3fa88f;
      --coral: #f0887a;
      --coral-deep: #d96a5c;
      --sky: #7eb6e8;
      --sky-deep: #5a97cc;
      --butter: #f0c86a;
      --butter-deep: #d4a843;
      --lilac: #c4a8e0;
      --lilac-deep: #a485c4;
      --wall: #d9cfc2;
      --neck: #cbb9a6;
      --safe: #ffffff;
      --fail: #ffd4cc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: "Nunito", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 20% -10%, #d9efe8 0%, transparent 55%),
        radial-gradient(900px 500px at 100% 10%, #f3e2d4 0%, transparent 50%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bot));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-x: hidden;
    }

    .phone {
      width: min(390px, 100%);
      aspect-ratio: 9 / 19.5;
      max-height: 92dvh;
      background: linear-gradient(165deg, #fffefb, #f3ebe3);
      border-radius: 36px;
      box-shadow:
        0 0 0 10px #2a2e35,
        0 0 0 12px #1a1d22,
        0 28px 60px rgba(40, 48, 60, 0.35);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 108px;
      height: 28px;
      background: #1a1d22;
      border-radius: 20px;
      z-index: 5;
    }

    .status {
      display: flex;
      justify-content: space-between;
      padding: 18px 22px 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .top-bar {
      padding: 28px 18px 8px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 0 rgba(190, 175, 155, 0.45);
      transition: transform 0.12s ease;
    }
    .icon-btn:active { transform: scale(0.94); }

    .level-wrap {
      text-align: center;
    }
    .level-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .level-num {
      font-family: "Fraunces", Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
    }

    .hint-strip {
      margin: 0 18px 10px;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.55);
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
    }
    .hint-strip strong { color: var(--mint-deep); }

    .board-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 16px 10px;
      min-height: 0;
    }

    .board {
      width: 100%;
      aspect-ratio: 1;
      max-height: 100%;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.9), transparent 45%),
        var(--board);
      border-radius: 28px;
      border: 3px solid var(--board-edge);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 10px 24px rgba(120, 100, 80, 0.12);
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
    }

    .grain {
      pointer-events: none;
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .walls {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .wall {
      position: absolute;
      background: linear-gradient(180deg, #e8dfd4, var(--wall));
      border-radius: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .neck {
      position: absolute;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 4px,
        rgba(180, 150, 120, 0.18) 4px,
        rgba(180, 150, 120, 0.18) 5px
      );
      border: 2px dashed rgba(170, 140, 110, 0.35);
      border-radius: 8px;
      pointer-events: none;
    }
    .neck.narrow { width: 18%; }
    .neck.wide { width: 28%; }
    .neck-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 9px;
      font-weight: 800;
      color: rgba(130, 110, 90, 0.7);
      letter-spacing: 0.06em;
      background: rgba(251, 248, 243, 0.85);
      padding: 2px 6px;
      border-radius: 999px;
      white-space:nowrap;
    }

    .piece {
      position: absolute;
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s cubic-bezier(.2,.8,.2,1), filter 0.15s;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.12));
      z-index: 2;
    }
    .piece:active { transform: scale(0.94); }
    .piece.leaving {
      animation: squishOut 0.55s cubic-bezier(.2,.7,.2,1) forwards;
      pointer-events: none;
      z-index: 4;
    }
    .piece.bump {
      animation: bump 0.35s ease;
    }

    .blob {
      width: 100%;
      height: 100%;
      border-radius: 42% 48% 45% 50% / 48% 42% 52% 45%;
      display: grid;
      place-items: center;
      position: relative;
      box-shadow:
        inset 0 -8px 14px rgba(0,0,0,0.12),
        inset 0 6px 10px rgba(255,255,255,0.35);
    }
    .blob::after {
      content: "";
      position: absolute;
      top: 16%;
      left: 22%;
      width: 28%;
      height: 18%;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
    }
    .chev {
      font-size: 16px;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(0,0,0,0.15);
    }
    .size-tag {
      position: absolute;
      bottom: 8%;
      font-size: 10px;
      opacity: 0.9;
      letter-spacing: 0.04em;
    }

    .s { width: 14%; height: 14%; }
    .m { width: 18%; height: 18%; }
    .l { width: 24%; height: 24%; }
    .xl { width: 30%; height: 30%; }

    .mint .blob { background: linear-gradient(160deg, #8fdcc5, var(--mint-deep)); }
    .coral .blob { background: linear-gradient(160deg, #f5a598, var(--coral-deep)); }
    .sky .blob { background: linear-gradient(160deg, #9cc9f0, var(--sky-deep)); }
    .butter .blob { background: linear-gradient(160deg, #f6d68a, var(--butter-deep)); }
    .lilac .blob { background: linear-gradient(160deg, #d4bcec, var(--lilac-deep)); }

    @keyframes squishOut {
      0% { transform: scale(1); opacity: 1; }
      35% { transform: scale(1.15, 0.72); opacity: 1; }
      100% { transform: translateY(-120%) scale(0.4, 1.2); opacity: 0; }
    }
    @keyframes bump {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) scale(1.04, 0.94); }
      55% { transform: translateX(5px) scale(1.04, 0.94); }
    }
    @keyframes winPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .bottom-bar {
      padding: 8px 18px 22px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .action {
      border: none;
      border-radius: 18px;
      padding: 14px 8px;
      font-family: inherit;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 3px 0 rgba(190, 175, 155, 0.5);
      transition: transform 0.12s ease;
    }
    .action:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(190, 175, 155, 0.5); }
    .action.primary {
      background: linear-gradient(180deg, #7ed4bb, var(--mint-deep));
      color: #fff;
      box-shadow: 0 3px 0 #2f8f78;
    }
    .action span {
      display: block;
      font-size: 10px;
      font-weight: 700;
      opacity: 0.75;
      margin-top: 2px;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 108px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(44, 51, 64, 0.92);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      z-index: 6;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .win {
      position: absolute;
      inset: 0;
      background: rgba(251, 248, 243, 0.82);
      backdrop-filter: blur(4px);
      display: none;
      place-items: center;
      z-index: 7;
      text-align: center;
      padding: 24px;
    }
    .win.show { display: grid; animation: winPop 0.35s ease; }
    .win h2 {
      font-family: "Fraunces", Georgia, serif;
      font-size: 34px;
      margin-bottom: 6px;
    }
    .win p {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 18px;
    }
    .win button {
      border: none;
      background: linear-gradient(180deg, #7ed4bb, var(--mint-deep));
      color: #fff;
      font-family: inherit;
      font-weight: 800;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 18px;
      cursor: pointer;
      box-shadow: 0 3px 0 #2f8f78;
    }

    .caption {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(44,51,64,0.45);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      width: 90%;
      pointer-events: none;
    }

    @media (max-height: 720px) {
      .hint-strip { display: none; }
      .level-num { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="phone" id="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <span>●●● 5G ▮▮▮</span>
    </div>

    <header class="top-bar">
      <button class="icon-btn" id="btnBack" title="Back" aria-label="Back">←</button>
      <div class="level-wrap">
        <div class="level-label">Level</div>
        <div class="level-num">12</div>
      </div>
      <button class="icon-btn" id="btnSettings" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <div class="hint-strip">
      Tap a blob — it leaves only if the <strong>gap fits</strong> its size
    </div>

    <div class="board-wrap">
      <div class="board" id="board">
        <div class="grain"></div>
        <div class="walls" id="walls"></div>

        <!-- Narrow neck (top exit for XL must open by clearing smalls) -->
        <div class="neck narrow" style="top: 6%; left: 41%; height: 12%;">
          <span class="neck-label">NARROW</span>
        </div>
        <!-- Wide neck side -->
        <div class="neck wide" style="top: 42%; right: 4%; width: 14%; height: 16%; border-style: dashed;">
          <span class="neck-label">WIDE</span>
        </div>

        <!-- Pieces -->
        <button class="piece xl butter" data-size="4" data-ok="false" data-name="XL" style="left: 35%; top: 22%;" aria-label="XL butter blob facing up">
          <div class="blob"><span class="chev">↑</span><span class="size-tag">XL</span></div>
        </button>
        <button class="piece s mint" data-size="1" data-ok="true" data-name="S" style="left: 18%; top: 28%;" aria-label="Small mint blob facing up">
          <div class="blob"><span class="chev">↑</span><span class="size-tag">S</span></div>
        </button>
        <button class="piece s coral" data-size="1" data-ok="true" data-name="S" style="left: 68%; top: 26%;" aria-label="Small coral blob facing up">
          <div class="blob"><span class="chev">↑</span><span class="size-tag">S</span></div>
        </button>
        <button class="piece m sky" data-size="2" data-ok="true" data-name="M" style="left: 14%; top: 55%;" aria-label="Medium sky blob facing right">
          <div class="blob"><span class="chev">→</span><span class="size-tag">M</span></div>
        </button>
        <button class="piece l lilac" data-size="3" data-ok="false" data-name="L" style="left: 52%; top: 58%;" aria-label="Large lilac blob facing right">
          <div class="blob"><span class="chev">→</span><span class="size-tag">L</span></div>
        </button>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="action" id="btnUndo">Undo<span>free</span></button>
      <button class="action primary" id="btnHint">Hint<span>ad / pack</span></button>
      <button class="action" id="btnRestart">Restart<span>free</span></button>
    </div>

    <div class="toast" id="toast">Too big for this neck</div>

    <div class="win" id="win">
      <div>
        <h2>Board clear</h2>
        <p>That squish hit different.</p>
        <button id="btnNext">Next level</button>
      </div>
    </div>
  </div>

  <p class="caption">SQUISH OUT — main gameplay screen mock · tap the blobs</p>

  <script>
    const board = document.getElementById("board");
    const walls = document.getElementById("walls");
    const toast = document.getElementById("toast");
    const win = document.getElementById("win");

    // Soft wall blocks (visual only for UI demo)
    const wallRects = [
      { left: "8%", top: "8%", width: "28%", height: "10%" },
      { left: "64%", top: "8%", width: "28%", height: "10%" },
      { left: "8%", top: "8%", width: "10%", height: "28%" },
      { left: "82%", top: "8%", width: "10%", height: "28%" },
      { left: "8%", top: "78%", width: "84%", height: "10%" },
      { left: "38%", top: "48%", width: "10%", height: "22%" },
    ];
    wallRects.forEach((r) => {
      const el = document.createElement("div");
      el.className = "wall";
      Object.assign(el.style, r);
      walls.appendChild(el);
    });

    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function remaining() {
      return [...board.querySelectorAll(".piece")].filter((p) => !p.classList.contains("leaving") && p.style.display !== "none");
    }

    function openNarrowForXL() {
      const smallsLeft = remaining().filter((p) => p.dataset.size === "1");
      if (smallsLeft.length === 0) {
        const xl = board.querySelector('.piece.xl');
        if (xl) xl.dataset.ok = "true";
        const narrow = board.querySelector(".neck.narrow .neck-label");
        if (narrow) {
          narrow.textContent = "OPEN";
          narrow.style.color = "#3fa88f";
        }
      }
    }

    function maybeOpenLarge() {
      const mLeft = remaining().filter((p) => p.dataset.size === "2");
      if (mLeft.length === 0) {
        const L = board.querySelector(".piece.l");
        if (L) L.dataset.ok = "true";
      }
    }

    board.addEventListener("click", (e) => {
      const piece = e.target.closest(".piece");
      if (!piece || piece.classList.contains("leaving")) return;

      if (piece.dataset.ok !== "true") {
        piece.classList.remove("bump");
        void piece.offsetWidth;
        piece.classList.add("bump");
        showToast(piece.dataset.size === "4" ? "XL needs a wider neck — clear Smalls first" : "Path too tight — clear blockers first");
        return;
      }

      piece.classList.add("leaving");
      setTimeout(() => {
        piece.style.display = "none";
        openNarrowForXL();
        maybeOpenLarge();
        if (remaining().length === 0) win.classList.add("show");
      }, 480);
    });

    document.getElementById("btnRestart").addEventListener("click", () => location.reload());
    document.getElementById("btnNext").addEventListener("click", () => location.reload());
    document.getElementById("btnUndo").addEventListener("click", () => showToast("Undo — last move restored"));
    document.getElementById("btnHint").addEventListener("click", () => {
      const next = remaining().find((p) => p.dataset.ok === "true");
      if (!next) return;
      next.animate(
        [{ transform: "scale(1)" }, { transform: "scale(1.12)" }, { transform: "scale(1)" }],
        { duration: 500, iterations: 2 }
      );
      showToast("Hint: try the glowing-size move");
    });
    document.getElementById("btnBack").addEventListener("click", () => showToast("Back to level map"));
    document.getElementById("btnSettings").addEventListener("click", () => showToast("Settings · sound · haptics"));
  </script>
</body>
</html>
